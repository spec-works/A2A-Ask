name: .NET Test

on:
  push:
    branches: [ main, master ]
    paths:
      - 'dotnet/**'
      - '.github/workflows/dotnet-test.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'dotnet/**'
      - '.github/workflows/dotnet-test.yml'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Checkout a2a-dotnet SDK
      uses: actions/checkout@v4
      with:
        repository: a2aproject/a2a-dotnet
        ref: darrelmiller/issue-331-version-negotiation
        path: a2a-dotnet

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      working-directory: dotnet
      run: dotnet restore /p:RestoreConfigFile=${{ github.workspace }}/nuget.config
      env:
        A2A_SDK_ROOT: ${{ github.workspace }}/a2a-dotnet

    - name: Build
      working-directory: dotnet
      run: dotnet build --no-restore --configuration Release
      env:
        A2A_SDK_ROOT: ${{ github.workspace }}/a2a-dotnet

    - name: Test
      working-directory: dotnet
      run: dotnet test --no-build --configuration Release --verbosity normal
      env:
        A2A_SDK_ROOT: ${{ github.workspace }}/a2a-dotnet
